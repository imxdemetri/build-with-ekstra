name: npm-controls-web

on:
  push:
    tags:
      - "controls-web-v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/controls-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck package
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Validate release metadata
        run: npm run release:check

      - name: Resolve version and dist-tag
        id: meta
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            EXPECTED_TAG="controls-web-v${VERSION}"
            if [[ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]]; then
              echo "Tag ${GITHUB_REF_NAME} does not match package version ${VERSION}" >&2
              exit 1
            fi
          fi
          if [[ "${VERSION}" == *-* ]]; then
            DIST_TAG="preview"
          else
            DIST_TAG="latest"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "dist_tag=${DIST_TAG}" >> "$GITHUB_OUTPUT"

      - name: Publish controls package with npm token
        if: ${{ secrets.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance --tag "${{ steps.meta.outputs.dist_tag }}"

      - name: Publish controls package with trusted publishing
        if: ${{ secrets.NPM_TOKEN == '' }}
        run: npm publish --access public --provenance --tag "${{ steps.meta.outputs.dist_tag }}"
