name: npm-controls-web

on:
  push:
    tags:
      - "controls-web-v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: packages/controls-web
        run: npm ci

      - name: Build package
        working-directory: packages/controls-web
        run: npm run build

      - name: Publish controls package
        working-directory: packages/controls-web
        run: npm publish --access public --provenance
